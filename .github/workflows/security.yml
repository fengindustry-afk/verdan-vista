name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed advisories surface even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail only on high/critical in runtime (production) dependencies — the code
      # that actually ships to users. Dev-tooling advisories are reported but do
      # not block (see SECURITY.md "residual risks").
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies (report-only)
        run: npm audit || true

      # Registry signature / provenance check (supply-chain integrity).
      # Report-only: not all deps publish signatures yet.
      - name: Verify dependency signatures
        run: npm audit signatures || true

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
